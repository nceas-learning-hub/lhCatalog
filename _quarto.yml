project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"

filters:
- nceas-learning-hub/theme
- quarto-ext/fontawesome
exercises: ### for custom theme callouts
  number: true ### see https://cambiotraining.github.io/quarto-course-template/materials/02-content_guidelines.html
editor: source
execute:
  freeze: auto

format:
  theme-html:
    code-annotations: hover ### tool tip style footnotes for code

website:
  title: "lhCatalog"
  reader-mode: false
  repo-url: https://github.com/nceas-learning-hub/lhCatalog

  ### learning hub logo on browser tab
  favicon: _extensions/nceas-learning-hub/theme/banner/logo_lh_hex.png

  bread-crumbs: false
  navbar:
    right:
      - text: "Instructors"
        menu:
          - text: "Casey O'Hara"
            href: https://www.oharascience.com/
      - icon: github
        href: https://github.com/nceas-learning-hub/lhCatalog
        aria-label: GitHub

  sidebar:
    title: "Training Materials"
    style: "floating"
    search: true
    tools:
      - icon: house-door-fill
        href: https://www.nceas.ucsb.edu/learning-hub
      - icon: twitter
        href: https://twitter.com/ucsb_nceas
      - icon: github
        href: https://github.com/nceas-learning-hub/lhCatalog
    contents:
      - index.qmd # preface
      # START SESSIONS
      # SESSION_LINKS
      # END SESSIONS

  page-footer:
    center: "Copyright \u00a9 2026, NCEAS"
    ### NCEAS main website footer:
    # center: "\u00a9 The Regents of the University of California, All Rights Reserved"
    # could also include license info?


